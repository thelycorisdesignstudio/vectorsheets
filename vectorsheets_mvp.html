<style>
  .vs-root { font-family: var(--font-mono, ui-monospace, monospace); color: var(--color-text-primary); }
  .vs-shell { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
  .vs-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .vs-brand { display: flex; align-items: baseline; gap: 8px; }
  .vs-brand-name { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
  .vs-brand-tag { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; }
  .vs-actions { display: flex; gap: 6px; }
  .vs-btn { font-family: inherit; font-size: 12px; padding: 6px 10px; border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-primary); border-radius: var(--border-radius-md); cursor: pointer; }
  .vs-btn:hover { background: var(--color-background-secondary); }
  .vs-btn.primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
  .vs-btn.primary:hover { opacity: 0.85; background: var(--color-text-primary); }
  .vs-prompt-row { display: flex; gap: 8px; padding: 12px 18px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
  .vs-prompt { flex: 1; font-family: inherit; font-size: 13px; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
  .vs-prompt:focus { outline: none; border-color: var(--color-text-primary); box-shadow: 0 0 0 1px var(--color-text-primary); }
  .vs-suggestions { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 18px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
  .vs-chip { font-family: inherit; font-size: 11px; padding: 4px 8px; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); border-radius: 999px; cursor: pointer; color: var(--color-text-secondary); }
  .vs-chip:hover { color: var(--color-text-primary); border-color: var(--color-border-secondary); }
  .vs-formula-bar { display: flex; align-items: center; gap: 10px; padding: 6px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 12px; }
  .vs-cell-ref { min-width: 48px; padding: 4px 8px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); font-weight: 500; text-align: center; }
  .vs-formula-input { flex: 1; font-family: inherit; font-size: 12px; padding: 4px 6px; border: none; background: transparent; color: var(--color-text-primary); outline: none; }
  .vs-grid-wrap { max-height: 420px; overflow: auto; }
  .vs-grid { border-collapse: collapse; font-size: 12px; width: 100%; }
  .vs-grid th, .vs-grid td { border: 0.5px solid var(--color-border-tertiary); padding: 0; height: 26px; min-width: 84px; max-width: 84px; box-sizing: border-box; }
  .vs-grid th { background: var(--color-background-secondary); color: var(--color-text-secondary); font-weight: 400; font-size: 11px; text-align: center; position: sticky; top: 0; z-index: 2; }
  .vs-grid th.row-h { position: sticky; left: 0; z-index: 1; min-width: 36px; max-width: 36px; }
  .vs-grid th.corner { z-index: 3; left: 0; }
  .vs-cell { padding: 4px 6px; cursor: cell; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .vs-cell.selected { box-shadow: inset 0 0 0 2px var(--color-text-primary); }
  .vs-cell.is-num { text-align: right; }
  .vs-cell.is-header { font-weight: 500; background: var(--color-background-secondary); }
  .vs-cell input { width: 100%; height: 100%; border: none; outline: none; font-family: inherit; font-size: 12px; padding: 0; background: transparent; color: inherit; }
  .vs-status { display: flex; justify-content: space-between; padding: 8px 18px; font-size: 11px; color: var(--color-text-tertiary); border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
  .vs-thinking { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--color-text-secondary); }
  .vs-dot { width: 6px; height: 6px; background: var(--color-text-primary); border-radius: 50%; animation: vs-pulse 1.2s infinite; }
  @keyframes vs-pulse { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
  .vs-summary { padding: 14px 18px; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); font-size: 13px; line-height: 1.6; max-height: 200px; overflow-y: auto; }
  .vs-summary h4 { margin: 0 0 6px; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; }
  .vs-chart { padding: 14px 18px; border-top: 0.5px solid var(--color-border-tertiary); }
  .vs-chart canvas { max-height: 240px; }
  .vs-error { padding: 10px 18px; font-size: 12px; color: var(--color-text-danger); background: var(--color-background-danger); border-top: 0.5px solid var(--color-border-danger); }
</style>

<div class="vs-root">
  <div class="vs-shell">
    <div class="vs-header">
      <div class="vs-brand">
        <span class="vs-brand-name">Vectorsheets</span>
        <span class="vs-brand-tag">by SuperOrbit</span>
      </div>
      <div class="vs-actions">
        <button class="vs-btn" id="vs-clear">Clear</button>
        <button class="vs-btn" id="vs-export">Export CSV</button>
      </div>
    </div>

    <div class="vs-prompt-row">
      <input class="vs-prompt" id="vs-prompt" placeholder="Describe what you want — a model, a forecast, a plan…" />
      <button class="vs-btn primary" id="vs-run">Generate</button>
    </div>

    <div class="vs-suggestions" id="vs-suggestions">
      <button class="vs-chip" data-prompt="Build a 12-month SaaS revenue forecast: 100 starting customers, $50/seat, 8% monthly growth, 3% churn">12-month SaaS forecast</button>
      <button class="vs-chip" data-prompt="Create a hiring plan for a 15-person engineering team across 4 quarters with salary bands">Engineering hiring plan</button>
      <button class="vs-chip" data-prompt="Q3 sales analysis: 8 products across 4 regions, segment revenue and identify top performers">Q3 sales dashboard</button>
      <button class="vs-chip" data-prompt="Build a personal monthly budget for a household of 4 with categories and totals">Household budget</button>
    </div>

    <div class="vs-formula-bar">
      <span class="vs-cell-ref" id="vs-ref">A1</span>
      <input class="vs-formula-input" id="vs-formula" placeholder="Type a value or =FORMULA" />
    </div>

    <div class="vs-grid-wrap" id="vs-grid-wrap">
      <table class="vs-grid" id="vs-grid"></table>
    </div>

    <div id="vs-error-slot"></div>
    <div id="vs-summary-slot"></div>
    <div id="vs-chart-slot"></div>

    <div class="vs-status">
      <span id="vs-status-left">Ready</span>
      <span id="vs-status-right">Vector AI · single-prompt workflow</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
(function(){
  const ROWS = 30, COLS = 10;
  const colLetter = (n) => String.fromCharCode(65 + n);
  const cellId = (r, c) => `${colLetter(c)}${r+1}`;
  const parseRef = (ref) => {
    const m = /^([A-J])(\d+)$/i.exec(ref.trim());
    if (!m) return null;
    return { r: parseInt(m[2],10) - 1, c: m[1].toUpperCase().charCodeAt(0) - 65 };
  };

  // State
  const state = {
    raw: Array.from({length: ROWS}, () => Array(COLS).fill('')),
    sel: { r: 0, c: 0 },
    editing: null,
    chart: null
  };

  // Persistence
  async function saveState() {
    try { await window.storage.set('vs:sheet', JSON.stringify(state.raw)); } catch(e) {}
  }
  async function loadState() {
    try {
      const r = await window.storage.get('vs:sheet');
      if (r && r.value) {
        const data = JSON.parse(r.value);
        if (Array.isArray(data) && data.length === ROWS) state.raw = data;
      }
    } catch(e) {}
  }

  // Formula engine
  function evalCell(r, c, visiting) {
    const raw = state.raw[r][c];
    if (raw === '' || raw === null || raw === undefined) return '';
    const s = String(raw);
    if (!s.startsWith('=')) {
      const n = Number(s);
      return isNaN(n) || s.trim() === '' ? s : n;
    }
    const key = `${r},${c}`;
    if (visiting.has(key)) return '#CIRC';
    visiting.add(key);
    try {
      const result = evalExpr(s.slice(1), visiting);
      visiting.delete(key);
      return result;
    } catch(e) {
      visiting.delete(key);
      return '#ERR';
    }
  }

  function evalExpr(expr, visiting) {
    // Functions: SUM, AVG, AVERAGE, MIN, MAX, COUNT, IF
    let e = expr.replace(/\s+/g, '');
    // Replace functions
    e = expandFunctions(e, visiting);
    // Replace cell refs
    e = e.replace(/\$?([A-J])\$?(\d+)/gi, (m, col, row) => {
      const cc = col.toUpperCase().charCodeAt(0) - 65;
      const rr = parseInt(row,10) - 1;
      if (rr < 0 || rr >= ROWS || cc < 0 || cc >= COLS) return '0';
      const v = evalCell(rr, cc, visiting);
      return typeof v === 'number' ? String(v) : '0';
    });
    // Safe eval — only allow numbers, operators, parens
    if (!/^[-+/*().,0-9eE%<>=! ]*$/.test(e)) throw new Error('bad');
    // eslint-disable-next-line no-new-func
    return Function('"use strict"; return (' + e + ')')();
  }

  function expandFunctions(e, visiting) {
    const fns = ['SUM','AVERAGE','AVG','MIN','MAX','COUNT'];
    let changed = true;
    while (changed) {
      changed = false;
      for (const fn of fns) {
        const re = new RegExp(fn + '\\(([^()]*)\\)', 'i');
        const m = re.exec(e);
        if (m) {
          const args = m[1];
          const vals = expandRange(args, visiting);
          let result = 0;
          if (fn.toUpperCase() === 'SUM') result = vals.reduce((a,b)=>a+b,0);
          else if (fn.toUpperCase() === 'AVERAGE' || fn.toUpperCase() === 'AVG') result = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
          else if (fn.toUpperCase() === 'MIN') result = vals.length ? Math.min(...vals) : 0;
          else if (fn.toUpperCase() === 'MAX') result = vals.length ? Math.max(...vals) : 0;
          else if (fn.toUpperCase() === 'COUNT') result = vals.length;
          e = e.slice(0, m.index) + String(result) + e.slice(m.index + m[0].length);
          changed = true;
        }
      }
    }
    return e;
  }

  function expandRange(args, visiting) {
    const parts = args.split(',');
    const out = [];
    for (const p of parts) {
      const rangeMatch = /^\$?([A-J])\$?(\d+):\$?([A-J])\$?(\d+)$/i.exec(p);
      if (rangeMatch) {
        const c1 = rangeMatch[1].toUpperCase().charCodeAt(0) - 65;
        const r1 = parseInt(rangeMatch[2],10) - 1;
        const c2 = rangeMatch[3].toUpperCase().charCodeAt(0) - 65;
        const r2 = parseInt(rangeMatch[4],10) - 1;
        for (let r = Math.min(r1,r2); r <= Math.max(r1,r2); r++) {
          for (let c = Math.min(c1,c2); c <= Math.max(c1,c2); c++) {
            const v = evalCell(r, c, visiting);
            if (typeof v === 'number') out.push(v);
          }
        }
      } else {
        const ref = parseRef(p);
        if (ref) {
          const v = evalCell(ref.r, ref.c, visiting);
          if (typeof v === 'number') out.push(v);
        } else {
          const n = Number(p);
          if (!isNaN(n)) out.push(n);
        }
      }
    }
    return out;
  }

  function formatVal(v) {
    if (typeof v === 'number') {
      if (Number.isInteger(v)) return v.toLocaleString();
      return Number(v.toFixed(2)).toLocaleString();
    }
    return v == null ? '' : String(v);
  }

  // Render
  function renderGrid() {
    const tbl = document.getElementById('vs-grid');
    let html = '<thead><tr><th class="corner row-h"></th>';
    for (let c = 0; c < COLS; c++) html += `<th>${colLetter(c)}</th>`;
    html += '</tr></thead><tbody>';
    for (let r = 0; r < ROWS; r++) {
      html += `<tr><th class="row-h">${r+1}</th>`;
      for (let c = 0; c < COLS; c++) {
        const v = evalCell(r, c, new Set());
        const isNum = typeof v === 'number';
        const raw = state.raw[r][c];
        const isHeader = r === 0 && raw && !String(raw).startsWith('=') && isNaN(Number(raw)) && raw !== '';
        const sel = state.sel.r === r && state.sel.c === c ? ' selected' : '';
        const cls = `vs-cell${sel}${isNum ? ' is-num' : ''}${isHeader ? ' is-header' : ''}`;
        html += `<td class="${cls}" data-r="${r}" data-c="${c}">${escapeHtml(formatVal(v))}</td>`;
      }
      html += '</tr>';
    }
    html += '</tbody>';
    tbl.innerHTML = html;
    bindCells();
    updateFormulaBar();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  function bindCells() {
    document.querySelectorAll('#vs-grid td.vs-cell').forEach(td => {
      td.addEventListener('click', () => {
        const r = +td.dataset.r, c = +td.dataset.c;
        state.sel = { r, c };
        renderGrid();
      });
      td.addEventListener('dblclick', () => {
        const r = +td.dataset.r, c = +td.dataset.c;
        startEdit(r, c, td);
      });
    });
  }

  function startEdit(r, c, td) {
    const current = state.raw[r][c] || '';
    td.innerHTML = `<input value="${escapeHtml(current)}" />`;
    const inp = td.querySelector('input');
    inp.focus();
    inp.select();
    const commit = () => {
      state.raw[r][c] = inp.value;
      saveState();
      renderGrid();
    };
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { commit(); state.sel = { r: Math.min(r+1, ROWS-1), c }; renderGrid(); }
      else if (e.key === 'Escape') { renderGrid(); }
      else if (e.key === 'Tab') { e.preventDefault(); commit(); state.sel = { r, c: Math.min(c+1, COLS-1) }; renderGrid(); }
    });
  }

  function updateFormulaBar() {
    const { r, c } = state.sel;
    document.getElementById('vs-ref').textContent = cellId(r, c);
    document.getElementById('vs-formula').value = state.raw[r][c] || '';
  }

  document.getElementById('vs-formula').addEventListener('change', (e) => {
    const { r, c } = state.sel;
    state.raw[r][c] = e.target.value;
    saveState();
    renderGrid();
  });

  // Keyboard nav
  document.addEventListener('keydown', (e) => {
    if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) return;
    const { r, c } = state.sel;
    let nr = r, nc = c;
    if (e.key === 'ArrowUp') nr = Math.max(0, r-1);
    else if (e.key === 'ArrowDown') nr = Math.min(ROWS-1, r+1);
    else if (e.key === 'ArrowLeft') nc = Math.max(0, c-1);
    else if (e.key === 'ArrowRight') nc = Math.min(COLS-1, c+1);
    else if (e.key === 'Enter' || e.key === 'F2') {
      const td = document.querySelector(`td[data-r="${r}"][data-c="${c}"]`);
      if (td) startEdit(r, c, td);
      return;
    }
    else if (e.key === 'Delete' || e.key === 'Backspace') {
      state.raw[r][c] = '';
      saveState();
      renderGrid();
      return;
    }
    else return;
    state.sel = { r: nr, c: nc };
    renderGrid();
    e.preventDefault();
  });

  // Suggestions
  document.querySelectorAll('.vs-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.getElementById('vs-prompt').value = chip.dataset.prompt;
      runPrompt();
    });
  });

  // Clear / export
  document.getElementById('vs-clear').addEventListener('click', () => {
    state.raw = Array.from({length: ROWS}, () => Array(COLS).fill(''));
    document.getElementById('vs-summary-slot').innerHTML = '';
    document.getElementById('vs-chart-slot').innerHTML = '';
    document.getElementById('vs-error-slot').innerHTML = '';
    saveState();
    renderGrid();
    setStatus('Cleared');
  });

  document.getElementById('vs-export').addEventListener('click', () => {
    let csv = '';
    for (let r = 0; r < ROWS; r++) {
      const row = [];
      let hasContent = false;
      for (let c = 0; c < COLS; c++) {
        const v = evalCell(r, c, new Set());
        const s = v === '' ? '' : String(v);
        if (s) hasContent = true;
        row.push(s.includes(',') || s.includes('"') ? `"${s.replace(/"/g,'""')}"` : s);
      }
      if (hasContent || r < 5) csv += row.join(',') + '\n';
    }
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'vectorsheet.csv'; a.click();
    URL.revokeObjectURL(url);
  });

  // AI integration
  document.getElementById('vs-run').addEventListener('click', runPrompt);
  document.getElementById('vs-prompt').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') runPrompt();
  });

  function setStatus(msg, thinking) {
    const left = document.getElementById('vs-status-left');
    if (thinking) left.innerHTML = `<span class="vs-thinking"><span class="vs-dot"></span>${escapeHtml(msg)}</span>`;
    else left.textContent = msg;
  }

  function showError(msg) {
    document.getElementById('vs-error-slot').innerHTML = `<div class="vs-error">${escapeHtml(msg)}</div>`;
    setTimeout(() => { document.getElementById('vs-error-slot').innerHTML = ''; }, 6000);
  }

  async function runPrompt() {
    const prompt = document.getElementById('vs-prompt').value.trim();
    if (!prompt) return;
    setStatus('Thinking…', true);
    document.getElementById('vs-error-slot').innerHTML = '';

    const sysPrompt = `You are Vector AI, the agent powering Vectorsheets. The user describes a business outcome and you generate a complete spreadsheet to fulfil it.

Return ONLY a JSON object with this exact shape — no prose, no markdown, no code fences:
{
  "headers": ["Column A header", "Column B header", ...],
  "rows": [["row 1 col A", "row 1 col B", ...], ...],
  "formulas": {"C5": "=SUM(C2:C4)", ...},
  "summary": "1-3 sentence narrative insight",
  "chart": { "type": "bar" | "line" | "none", "labelCol": 0, "valueCol": 1, "title": "Chart title" }
}

Rules:
- Max 10 columns, max 25 data rows.
- "rows" contains the data only — do NOT repeat headers in rows.
- Numeric values must be plain numbers (no $ or commas) — formatting happens in the UI.
- Use the "formulas" object to add formula cells. Cell refs are A1-style. The first row of data is row 2 (row 1 is headers).
- Supported functions: SUM, AVERAGE, MIN, MAX, COUNT. Plus + - * / ( ).
- Add a totals/summary row using formulas where it makes sense.
- For "chart": pick the most insightful single chart, or "none" if not useful. labelCol/valueCol are 0-indexed column positions.
- Be specific and realistic with numbers — this is for serious business analysis.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 3000,
          system: sysPrompt,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      if (!res.ok) throw new Error('API ' + res.status);
      const data = await res.json();
      const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
      const cleaned = text.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();
      const parsed = JSON.parse(cleaned);
      applyResult(parsed);
      setStatus('Generated · ' + (parsed.headers || []).length + ' cols × ' + ((parsed.rows||[]).length + 1) + ' rows');
    } catch (e) {
      console.error(e);
      showError('Could not generate: ' + e.message + '. Try simplifying the prompt.');
      setStatus('Ready');
    }
  }

  function applyResult(r) {
    state.raw = Array.from({length: ROWS}, () => Array(COLS).fill(''));
    const headers = (r.headers || []).slice(0, COLS);
    headers.forEach((h, c) => state.raw[0][c] = h);
    const rows = (r.rows || []).slice(0, ROWS - 1);
    rows.forEach((row, ri) => {
      (row || []).slice(0, COLS).forEach((val, c) => {
        state.raw[ri + 1][c] = val == null ? '' : String(val);
      });
    });
    if (r.formulas && typeof r.formulas === 'object') {
      Object.entries(r.formulas).forEach(([ref, f]) => {
        const p = parseRef(ref);
        if (p && p.r < ROWS && p.c < COLS) state.raw[p.r][p.c] = String(f);
      });
    }
    saveState();
    renderGrid();

    // Summary
    if (r.summary) {
      document.getElementById('vs-summary-slot').innerHTML =
        `<div class="vs-summary"><h4>Insight</h4>${escapeHtml(r.summary)}</div>`;
    } else {
      document.getElementById('vs-summary-slot').innerHTML = '';
    }

    // Chart
    document.getElementById('vs-chart-slot').innerHTML = '';
    if (state.chart) { state.chart.destroy(); state.chart = null; }
    if (r.chart && r.chart.type && r.chart.type !== 'none') {
      const labelCol = r.chart.labelCol || 0;
      const valueCol = r.chart.valueCol || 1;
      const labels = [];
      const values = [];
      for (let i = 1; i < ROWS; i++) {
        const lab = evalCell(i, labelCol, new Set());
        const val = evalCell(i, valueCol, new Set());
        if (lab === '' && val === '') continue;
        if (typeof val === 'number' && !String(lab).toLowerCase().includes('total')) {
          labels.push(String(lab));
          values.push(val);
        }
      }
      if (labels.length) {
        const wrap = document.getElementById('vs-chart-slot');
        wrap.innerHTML = `<div class="vs-chart"><h4 style="font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin:0 0 8px;">${escapeHtml(r.chart.title || 'Chart')}</h4><canvas id="vs-canvas"></canvas></div>`;
        const ctx = document.getElementById('vs-canvas').getContext('2d');
        const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const fg = isDark ? '#e8e6e1' : '#1a1a1a';
        const grid = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
        state.chart = new Chart(ctx, {
          type: r.chart.type === 'line' ? 'line' : 'bar',
          data: {
            labels,
            datasets: [{
              label: headers[valueCol] || 'Value',
              data: values,
              backgroundColor: fg,
              borderColor: fg,
              borderWidth: 1.5,
              tension: 0.25
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: fg, font: { size: 10 } }, grid: { color: grid } },
              y: { ticks: { color: fg, font: { size: 10 } }, grid: { color: grid }, beginAtZero: true }
            }
          }
        });
      }
    }
  }

  // Init
  loadState().then(() => renderGrid());
})();
</script>
